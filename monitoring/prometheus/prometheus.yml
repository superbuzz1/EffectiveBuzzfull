global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lead-machine-api'
    metrics_path: '/metrics'
    static_configs:
      # In this setup, host.docker.internal points to the host machine running the Node app on 3000
      - targets: ['host.docker.internal:3000']
